# ==============================================================================
# FAST TMUX CONFIG
# ==============================================================================

unbind C-b
set-option -g prefix C-s
bind C-s send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Terminal / rendering ----------------------------------------------------------
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g focus-events on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Behavior ----------------------------------------------------------------------
set -g mouse on
set -g set-clipboard on
set -g detach-on-destroy off
set -s escape-time 0
set -g repeat-time 350
set -g display-time 2000
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g allow-rename off
setw -g mode-keys vi

# Copy mode ---------------------------------------------------------------------
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi r send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
unbind -T copy-mode-vi MouseDragEnd1Pane
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "selectp -P bg=#15161e" "selectp -P default"'

# Panes / windows ---------------------------------------------------------------
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

unbind h
unbind j
unbind k
unbind l
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -n M-Left if -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind -n M-Right if -F "#{pane_at_right}" "next-window" "select-pane -R"
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind -r C-p previous-window
bind -r C-n next-window
bind -r p previous-window
bind -r n next-window
bind-key Space last-window
bind-key L switch-client -l

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r z resize-pane -Z
bind -r M resize-pane -Z

bind-key -n M-i swap-window -t -1 \; select-window -t -1
bind-key -n M-o swap-window -t +1 \; select-window -t +1

# Friendly session/window controls ---------------------------------------------
unbind -q C-c
unbind -q C-o
unbind -q C-w
unbind -q C-g
unbind -q '$'

bind R command-prompt -I "#{session_name}" -p "rename session:" "rename-session '%%'"
bind , command-prompt -I "#{window_name}" -p "rename window:" "rename-window '%%'"
bind N command-prompt -p "new session:" "new-session -d -s '%%' -c '#{pane_current_path}' \; switch-client -t '%%'"
bind X confirm-before -p "kill session #S? (y/n)" "kill-session"
bind m choose-tree -Zs

# Popup tools -------------------------------------------------------------------
bind P display-popup -d "#{pane_current_path}" -w 80% -h 70% -E "~/dotfiles/.config/tmux/scripts/popup-menu.sh"
bind s display-popup -d "#{pane_current_path}" -w 80% -h 70% -E "~/dotfiles/.config/tmux/scripts/session-fzf.sh"
bind o display-popup -d "#{pane_current_path}" -w 80% -h 70% -E "~/dotfiles/.config/tmux/scripts/project-fzf.sh"
bind w display-popup -d "#{pane_current_path}" -w 76% -h 65% -E "~/dotfiles/.config/tmux/scripts/window-fzf.sh"
bind F display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "$SHELL -l"
bind g display-popup -d "#{pane_current_path}" -w 92% -h 88% -E "lazygit"
bind ? display-popup -w 90% -h 90% -E "tmux list-keys | fzf --reverse --prompt='keys> ' --header='tmux key bindings'"

# Minimal status ---------------------------------------------------------------
set -g status-position top
set -g status-justify left
set -g status-interval 3
set -g status-style 'bg=#1a1b26,fg=#c0caf5'
set -g message-style 'bg=#313244,fg=#cdd6f4,bold,align=centre'
set -g message-command-style 'bg=#313244,fg=#cdd6f4,bold,align=centre'
set -g mode-style 'bg=#313244,fg=#cdd6f4,bold'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'
set -g popup-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g popup-border-style 'fg=#45475a'
set -g clock-mode-colour '#cba6f7'

set -g window-status-separator '  '
set -g window-status-style 'bg=#1a1b26,fg=#565f89'
set -g window-status-format '#[fg=#565f89]#I:#W#F'
set -g window-status-current-style 'bg=#1a1b26,fg=#7aa2f7,bold'
set -g window-status-current-format '#[fg=#7aa2f7,bold]#I:#W#[fg=#e0af68]#{?window_zoomed_flag, Z,}'

set -g status-left-length 40
set -g status-right-length 100
set -g status-left '#{?client_prefix,#[fg=#e0af68]●,#[fg=#565f89]○} #[fg=#bb9af7]#S #[fg=#414868]| '
set -g status-right '#[fg=#565f89]#{b:pane_current_path} #[fg=#414868]| #[fg=#7aa2f7]%H:%M '

# No TPM here on purpose: popups and theme are local, fast, and restoration-free.
